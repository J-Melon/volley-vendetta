name: Sync Design Docs to GitHub Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'designs/**/*.md'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:

concurrency:
  group: sync-wiki
  cancel-in-progress: false

jobs:
  sync:
    name: Mirror designs to wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Checkout wiki
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.WIKI_TOKEN }}

      - name: Mirror designs/ into wiki
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          find wiki -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          for src in designs/**/*.md; do
            rel="${src#designs/}"
            # Top-level INDEX.md becomes Home.md; _Sidebar.md passes through.
            [ "$rel" = "INDEX.md" ] && continue
            # Wiki only renders top-level .md files, so flatten nested paths
            # with dashes: "01-prototype/foo.md" -> "01-prototype-foo.md".
            flat="${rel//\//-}"
            cp "$src" "wiki/$flat"
          done

          if [ -f designs/INDEX.md ]; then
            cp designs/INDEX.md wiki/Home.md
          fi

          # Rewrite markdown link targets: strip .md extensions and flatten
          # internal slashes to match the flattened filenames. Only touches
          # relative links (the [^):] class excludes "://" in URLs).
          find wiki -name '*.md' -print0 | xargs -0 perl -i -pe '
            s{\]\(([^):\s]+)\.md(\#[^)]*)?\)}{
              my ($p, $a) = ($1, $2 // "");
              $p =~ s|/|-|g;
              "]($p$a)"
            }ge'

      - name: Commit and push
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Sync designs/ from ${{ github.sha }}"
            git push
          else
            echo "No changes to sync."
          fi
