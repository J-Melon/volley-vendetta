name: Lint

on:
  pull_request:
    branches:
      - main

env:
  GITLEAKS_VERSION: "8.28.0"
  GDTOOLKIT_VERSION: "4.*"

jobs:
  lint:
    name: Run Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cache pipx + local bin
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/pipx
            ~/.local/bin
          key: lint-tools-${{ runner.os }}-gdtoolkit-${{ env.GDTOOLKIT_VERSION }}-gitleaks-${{ env.GITLEAKS_VERSION }}

      - name: Install gdtoolkit
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: pipx install "gdtoolkit==${{ env.GDTOOLKIT_VERSION }}"

      - name: Install codespell
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: pipx install codespell

      - name: Install gitleaks
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz | tar -xz
          mv gitleaks ~/.local/bin/

      - name: Add tools to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: gdformat
        run: find scripts tests -name '*.gd' | xargs gdformat --check

      - name: gdlint
        run: find scripts tests -name '*.gd' | xargs gdlint

      - name: codespell
        run: codespell

      - name: gitleaks
        run: gitleaks detect --redact --verbose --no-banner
